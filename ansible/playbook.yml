---
- name: Deploy Node.js app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 3000
    node_version: "22"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - curl
          - git
          - nginx
          - ca-certificates
          - gnupg
        state: present

    - name: Install Node.js 22.x via NodeSource
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy app files from repo
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Install database - PostgreSQL
      block:
        - name: Install PostgreSQL packages
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - python3-psycopg2
            state: present

        - name: Ensure PostgreSQL is started
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Fix pg_hba.conf to use md5 auth
          shell: |
            PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i 's/scram-sha-256/md5/g' "$PG_HBA"
            systemctl reload postgresql
          args:
            executable: /bin/bash

        - name: Create PostgreSQL database
          shell: |
            psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
            psql -U postgres -c "CREATE DATABASE {{ db_name }};"
          become_user: postgres
          when: db_name is defined and db_name != ''

        - name: Create PostgreSQL user
          shell: |
            psql -U postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
            psql -U postgres -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';"
          become_user: postgres
          when: db_username is defined and db_username != '' and db_password is defined and db_password != ''

        - name: Grant privileges to PostgreSQL user
          shell: |
            psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
          become_user: postgres
          when: db_name is defined and db_name != '' and db_username is defined and db_username != ''

      when: install_db | default('') == 'true' and db_type | default('') == 'postgres'

    - name: Install database - MySQL
      block:
        - name: Install MySQL server
          apt:
            name:
              - mysql-server
              - python3-mysqldb
            state: present

        - name: Ensure MySQL is started
          service:
            name: mysql
            state: started
            enabled: yes

        - name: Create MySQL database
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
          when: db_name is defined and db_name != ''

        - name: Create MySQL user and grant privileges
          shell: |
            mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}'; GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost'; FLUSH PRIVILEGES;"
          when: db_username is defined and db_username != '' and db_password is defined and db_password != '' and db_name is defined and db_name != ''

      when: install_db | default('') == 'true' and db_type | default('') == 'mysql'

    - name: Install database - MongoDB
      block:
        - name: Install MongoDB
          apt:
            name: mongodb
            state: present

        - name: Ensure MongoDB is started
          service:
            name: mongodb
            state: started
            enabled: yes

        - name: Create MongoDB database and collection
          shell: |
            mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")'
          when: db_name is defined and db_name != ''

      when: install_db | default('') == 'true' and db_type | default('') == 'mongodb'

    - name: Write /opt/app/.env file
      shell: |
        printf '' > {{ app_dir }}/.env
        [ -n "{{ node_env_database_url | default('') }}" ] && echo "DATABASE_URL={{ node_env_database_url }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_mongo_uri | default('') }}" ] && echo "MONGO_URI={{ node_env_mongo_uri }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_host | default('') }}" ] && echo "DB_HOST={{ node_env_db_host }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_port | default('') }}" ] && echo "DB_PORT={{ node_env_db_port }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_name | default('') }}" ] && echo "DB_NAME={{ node_env_db_name }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_user | default('') }}" ] && echo "DB_USER={{ node_env_db_user }}" >> {{ app_dir }}/.env || true
        [ -n "{{ node_env_db_password | default('') }}" ] && echo "DB_PASSWORD={{ node_env_db_password }}" >> {{ app_dir }}/.env || true
        chown ubuntu:ubuntu {{ app_dir }}/.env
        chmod 600 {{ app_dir }}/.env
      args:
        executable: /bin/bash

    - name: Set correct ownership on app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        recurse: yes

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    - name: Run build script if present
      shell: |
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"build"' "{{ app_dir }}/package.json"; then
          npm run build
        else
          echo "No build script found, skipping."
        fi
      args:
        chdir: "{{ app_dir }}"
        executable: /bin/bash
      become: yes
      become_user: ubuntu

    - name: Start app with PM2
      shell: |
        pm2 delete app 2>/dev/null || true
        set -a
        [ -f "{{ app_dir }}/.env" ] && . "{{ app_dir }}/.env"
        export PORT="${PORT:-3000}"
        export HOST="${HOST:-0.0.0.0}"
        set +a
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"start"' "{{ app_dir }}/package.json"; then
          pm2 start npm --name app --update-env -- start
        elif [ -f "{{ app_dir }}/server.js" ]; then
          pm2 start "{{ app_dir }}/server.js" --name app --update-env
        elif [ -f "{{ app_dir }}/index.js" ]; then
          pm2 start "{{ app_dir }}/index.js" --name app --update-env
        elif [ -f "{{ app_dir }}/app.js" ]; then
          pm2 start "{{ app_dir }}/app.js" --name app --update-env
        else
          echo "No Node.js entrypoint found in {{ app_dir }}" >&2
          exit 1
        fi
        pm2 save
      args:
        chdir: "{{ app_dir }}"
        executable: /bin/bash
      become: yes
      become_user: ubuntu

    - name: Install PM2 systemd startup service
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
      args:
        creates: /etc/systemd/system/pm2-ubuntu.service

    - name: Wait for app to be reachable on port 3000
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 10
        timeout: 120
        state: started
      ignore_errors: yes
      register: port_wait

    - name: Print PM2 logs if app did not start
      shell: pm2 logs app --lines 100 --nostream
      register: pm2_logs
      when: port_wait is failed
      become: yes
      become_user: ubuntu
      changed_when: false

    - name: Show PM2 logs
      debug:
        msg: "{{ pm2_logs.stdout_lines | default(['No logs captured']) }}"
      when: port_wait is failed

    - name: Fail if app did not start
      fail:
        msg: >
          App did not start on port {{ app_port }} within 120 seconds.
          Check the PM2 logs above. Common causes: missing build step,
          crashed script, wrong entrypoint, or mismatched port.
      when: port_wait is failed

    - name: Configure nginx reverse proxy
      copy:
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: Report server IP
      debug:
        msg: "server_ip={{ ansible_host }}"